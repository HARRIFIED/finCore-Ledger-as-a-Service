server:
  port: 8092

spring:
  application:
    name: iam-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${DB_USERNAME:finCore}
    password: ${DB_PASSWORD:finCore_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: GMT
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  flyway:
    enabled: true
    locations: classpath:db/migration

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9082}

jwt:
  expiry-seconds: ${JWT_EXPIRY_SECONDS:900}
  refresh-expiry-seconds: ${JWT_REFRESH_EXPIRY_SECONDS:604800} # 7 days
  # Issuer (iss) stamped on tokens — set to this iam-service's externally reachable base URL.
  issuer: ${JWT_ISSUER:http://localhost:8092}
  # RSA private key in PEM format — generated on startup when blank (dev only)
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans

logging:
  level:
    com.harrified.finCore: INFO
    org.hibernate.SQL: WARN

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
logging:
  level:
    com.harrified.finCore: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    hikari:
      maximum-pool-size: 30

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    hikari:
      maximum-pool-size: 50
  jpa:
    show-sql: false
management:
  tracing:
    sampling:
      probability: 0.1
